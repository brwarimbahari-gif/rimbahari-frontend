name: Sync dari Upstream

on:
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Sync dari upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/Rimbara/rimbara-frontend-react.git
          git fetch upstream main

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Sudah up-to-date"
            exit 0
          fi

          echo "Ada perubahan, mulai sync..."

          # Simpan workflows fork
          cp -r .github/workflows /tmp/fork-workflows

          # Reset ke upstream
          git reset --hard upstream/main

          # Kembalikan workflows fork
          cp -r /tmp/fork-workflows/. .github/workflows/

          # Commit jika ada perubahan
          git add .github/workflows/
          if git diff --cached --quiet; then
            echo "✅ Workflows tidak berubah"
          else
            git commit -m "ci: restore fork workflows after upstream sync"
          fi

          git push origin main --force
          echo "✅ Sync selesai"
